<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Medidas Metrológicas de Alta Precisão</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f1f3f4; 
            color: #202124;
        }

        .container {
            max-width: 700px;
            margin: 40px auto;
        }

        /* Card Principal do Conversor - Estilo Google */
        .google-card {
            background: #ffffff;
            border: 1px solid #dadce0;
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15);
            margin-bottom: 24px;
        }

        h2 {
            font-size: 22px;
            font-weight: 400;
            margin-top: 0;
            margin-bottom: 20px;
            color: #202124;
        }

        /* Estrutura do Seletor/Inputs */
        .converter-row {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }

        .input-box {
            flex: 1;
            position: relative;
        }

        .input-box input, .input-box select {
            width: 100%;
            height: 48px;
            padding: 12px;
            border: 1px solid #dadce0;
            border-radius: 4px;
            font-size: 16px;
            color: #202124;
            background-color: #fff;
        }

        .input-box input:focus, .input-box select:focus {
            outline: none;
            border-color: #1a73e8; 
            box-shadow: 0 1px 2px rgba(32,33,36,0.1);
        }

        .unit-select {
            width: 200px !important;
        }

        .equal-sign {
            font-size: 24px;
            color: #5f6368;
            font-weight: 300;
            margin: 4px 0;
            text-align: center;
        }

        /* Divisor de Fração Customizado */
        .fraction-inputs {
            display: none;
            gap: 8px;
            align-items: center;
            flex: 1;
        }
        
        .fraction-inputs select {
            height: 48px;
            padding: 12px;
            border: 1px solid #dadce0;
            border-radius: 4px;
            font-size: 16px;
            background-color: #fff;
        }

        /* Caixa de Busca da Tabela */
        .search-box {
            width: 100%;
            height: 44px;
            padding: 0 16px;
            border: 1px solid #dadce0;
            border-radius: 22px; 
            font-size: 15px;
            margin-bottom: 16px;
            background-color: #fff;
        }
        
        .search-box:focus {
            outline: none;
            box-shadow: 0 1px 6px rgba(32,33,36,0.28);
            border-color: rgba(223,225,229,0);
        }

        /* Tabela de Referência */
        .table-card {
            background: #ffffff;
            border: 1px solid #dadce0;
            border-radius: 8px;
            padding: 16px;
            max-height: 450px;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 12px 8px;
            font-size: 12px;
            color: #70757a;
            text-transform: uppercase;
            border-bottom: 1px solid #ebebeb;
            font-weight: 500;
        }

        td {
            padding: 10px 8px;
            font-size: 14px;
            color: #3c4043;
            border-bottom: 1px solid #f1f3f4;
            font-variant-numeric: tabular-nums;
        }

        tr.highlight-inch td {
            background-color: #e8f0fe;
            color: #1a73e8;
            font-weight: bold;
        }

        .text-right { text-align: right; }
        .hide-row { display: none !important; }
    </style>
</head>
<body>

<div class="container">

    <div class="google-card">
        <h2>Conversor Metrológico (4 Casas Decimais)</h2>
        
        <div class="converter-row">
            <div class="input-box" id="wrapper-input-left">
                <input type="number" id="input-left" value="1.0000" step="0.0001" oninput="executarConversao()">
            </div>
            
            <div class="fraction-inputs" id="wrapper-fraction-left">
                <select id="frac-inch-pure" onchange="executarConversao()"></select>
                <select id="frac-num" onchange="executarConversao()"></select>
                <span style="color:#5f6368; font-weight: bold;">/</span>
                <select id="frac-den" onchange="executarConversao()"></select>
            </div>

            <div class="input-box" style="max-width: 220px;">
                <select class="unit-select" id="unit-left" onchange="alternarModoInterface()">
                    <option value="in_dec" selected>Polegada Milesimal (in)</option>
                    <option value="in_frac">Polegada Fracionária (pol)</option>
                    <option value="mm">Milímetros (mm)</option>
                </select>
            </div>
        </div>

        <div class="equal-sign">=</div>

        <div class="converter-row">
            <div class="input-box">
                <input type="text" id="input-right" readonly style="background-color: #f8f9fa; color: #202124; font-weight: 500;">
            </div>
            <div class="input-box" style="max-width: 220px;">
                <select class="unit-select" id="unit-right" onchange="executarConversao()">
                    <option value="in_dec">Polegada Milesimal (in)</option>
                    <option value="mm" selected>Milímetros (mm)</option>
                </select>
            </div>
        </div>
    </div>

    <input type="text" class="search-box" id="table-search" placeholder="🔍 Filtrar tabela (ex: 1/8, 0.0625, 25,4000...)" oninput="filtrarTabela(this.value)">

    <div class="table-card">
        <table>
            <thead>
                <tr>
                    <th>Polegada Fracionária</th>
                    <th class="text-right">Polegada Milesimal</th>
                    <th class="text-right">Milímetros (mm)</th>
                </tr>
            </thead>
            <tbody id="table-body">
                </tbody>
        </table>
    </div>

</div>

<script>
    window.onload = function() {
        popularSeletoresFracao();
        gerarTabelaDados();
        alternarModoInterface(); // Inicializa os cálculos e estados dos inputs
    };

    // Popula as opções do menu de frações industriais
    function popularSeletoresFracao() {
        const num = document.getElementById('frac-num');
        const den = document.getElementById('frac-den');
        const inchPure = document.getElementById('frac-inch-pure');

        for(let i=0; i<=3; i++) {
            inchPure.innerHTML += `<option value="${i}">${i}"</option>`;
        }
        for(let i=0; i<=64; i++) {
            if(i === 0) num.innerHTML += `<option value="0">0 (inteiro)</option>`;
            else num.innerHTML += `<option value="${i}">${i}</option>`;
        }
        const dens = [2, 4, 8, 16, 32, 64];
        dens.forEach(d => {
            den.innerHTML += `<option value="${d}">${d}</option>`;
        });
        den.value = 16; 
    }

    // Função matemática auxiliar para simplificar frações da tabela
    function mdc(a, b) { return b ? mdc(b, a % b) : a; }
    function simplificarFracao(n, d) {
        let g = mdc(n, d);
        return [n/g, d/g];
    }

    // Gera a tabela de referência rigorosa com 4 casas decimais até 3"
    function gerarTabelaDados() {
        const tbody = document.getElementById('table-body');
        let html = "";

        // De 0 a 1 polegada com resolução máxima de 1/64
        for(let i = 1; i < 64; i++) {
            let [n, d] = simplificarFracao(i, 64);
            let dec = i / 64;
            let mm = dec * 25.4;
            html += `<tr><td>${n}/${d}"</td><td class="text-right">${dec.toFixed(4)}"</td><td class="text-right">${mm.toFixed(4)} mm</td></tr>`;
        }

        // Marcos de 1", 2" e 3" com intervalos de 1/16 entre elas
        for(let inch = 1; inch <= 3; inch++) {
            let mmInteiro = inch * 25.4;
            html += `<tr class="highlight-inch"><td>${inch}" (Inteira)</td><td class="text-right">${inch.toFixed(4)}"</td><td class="text-right">${mmInteiro.toFixed(4)} mm</td></tr>`;
            
            if(inch < 3) {
                for(let f = 1; f < 16; f++) {
                    let [n, d] = simplificarFracao(f, 16);
                    let dec = inch + (f / 16);
                    let mm = dec * 25.4;
                    html += `<tr><td>${inch} ${n}/${d}"</td><td class="text-right">${dec.toFixed(4)}"</td><td class="text-right">${mm.toFixed(4)} mm</td></tr>`;
                }
            }
        }
        tbody.innerHTML = html;
    }

    // Altera a visibilidade dos campos com base na unidade selecionada
    function alternarModoInterface() {
        const uLeft = document.getElementById('unit-left').value;
        const inpLeftWrapper = document.getElementById('wrapper-input-left');
        const fracLeftWrapper = document.getElementById('wrapper-fraction-left');

        if(uLeft === 'in_frac') {
            inpLeftWrapper.style.display = 'none';
            fracLeftWrapper.style.display = 'flex';
        } else {
            inpLeftWrapper.style.display = 'block';
            fracLeftWrapper.style.display = 'none';
        }
        executarConversao();
    }

    // Núcleo central revisado de cálculo metrológico (Garante as 4 casas)
    function executarConversao() {
        const uLeft = document.getElementById('unit-left').value;
        const uRight = document.getElementById('unit-right').value;
        const outRight = document.getElementById('input-right');
        
        let polegadaDecimalBase = 0;

        // 1. Coleta o valor de entrada e converte para uma base de polegada decimal pura
        if (uLeft === 'in_dec') {
            let v = parseFloat(document.getElementById('input-left').value);
            if(isNaN(v)) { outRight.value = ""; return; }
            polegadaDecimalBase = v;
        } 
        else if (uLeft === 'mm') {
            let v = parseFloat(document.getElementById('input-left').value);
            if(isNaN(v)) { outRight.value = ""; return; }
            polegadaDecimalBase = v / 25.4; // mm para polegada
        } 
        else if (uLeft === 'in_frac') {
            const inch = parseInt(document.getElementById('frac-inch-pure').value) || 0;
            const num = parseInt(document.getElementById('frac-num').value) || 0;
            const den = parseInt(document.getElementById('frac-den').value) || 1;
            polegadaDecimalBase = inch + (num / den);
        }

        // 2. Transforma a base calculada na unidade de saída escolhida pelo usuário
        if (uRight === 'mm') {
            let resultadoMm = polegadaDecimalBase * 25.4;
            outRight.value = resultadoMm.toFixed(4) + " mm";
        } 
        else if (uRight === 'in_dec') {
            outRight.value = polegadaDecimalBase.toFixed(4) + " in";
        }
    }

    // Filtro em tempo real da tabela (Substitui pontos por vírgulas para facilitar buscas brasileiras)
    function filtrarTabela(busca) {
        const filtro = busca.toLowerCase().trim().replace(',', '.');
        const linhas = document.querySelectorAll('#table-body tr');

        linhas.forEach(linha => {
            const textoLinha = linha.textContent.toLowerCase().replace(',', '.');
            if(textoLinha.includes(filtro)) {
                linha.classList.remove('hide-row');
            } else {
                linha.classList.add('hide-row');
            }
        });
    }
</script>

</body>
</html>
