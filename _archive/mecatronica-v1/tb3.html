<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treinador de Circuitos</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0a0f1f;
  color: white;
  text-align: center;
}

.container {
  max-width: 600px;
  margin: auto;
  padding: 20px;
}

.card {
  background: #111a33;
  padding: 20px;
  border-radius: 12px;
  margin-top: 20px;
}

button {
  margin: 10px;
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  background: #00c3ff;
  color: black;
  font-weight: bold;
  cursor: pointer;
}

input {
  padding: 10px;
  border-radius: 8px;
  border: none;
  margin-top: 10px;
  width: 100px;
  text-align: center;
}

.correct {
  color: #00ff88;
}

.wrong {
  color: #ff4d4d;
}
</style>
</head>

<body>
<nav class="navbar">
  <h2>⚡ Circuitos SENAI</h2>
  <div>
    <a href="index.html">Dashboard</a>
    <a href="treino.html">Treino</a>
  </div>
</nav>
<div class="container">
  <h1>⚡ Treinador de Circuitos</h1>

  <div class="card">
    <p id="question">Clique em "Novo Exercício"</p>

    <input type="number" id="answer" placeholder="Resposta">

    <div>
      <button onclick="checkAnswer()">Verificar</button>
      <button onclick="newExercise()">Novo Exercício</button>
      <button onclick="showAnswer()">Mostrar Resposta</button>
    </div>

    <p id="feedback"></p>
  </div>
</div>

<script>
let correctAnswer = 0;
let formula = "";
let resolution = "";

function newExercise() {
  document.getElementById("feedback").innerHTML = "";
  document.getElementById("answer").value = "";

  const type = Math.floor(Math.random() * 3);

  if (type === 0) {
    // Lei de Ohm
    const V = Math.floor(Math.random() * 20) + 5;
    const R = Math.floor(Math.random() * 10) + 1;

    correctAnswer = V / R;

    formula = "I = V / R";
    resolution = `I = ${V} / ${R} = ${correctAnswer.toFixed(2)} A`;

    document.getElementById("question").innerText =
      `Calcule a corrente: V = ${V}V e R = ${R}Ω`;
  }

  else if (type === 1) {
    // Série
    const R1 = Math.floor(Math.random() * 10) + 1;
    const R2 = Math.floor(Math.random() * 10) + 1;

    correctAnswer = R1 + R2;

    formula = "Req = R1 + R2";
    resolution = `Req = ${R1} + ${R2} = ${correctAnswer} Ω`;

    document.getElementById("question").innerText =
      `Resistores em série: ${R1}Ω + ${R2}Ω = ?`;
  }

  else {
    // Potência
    const V = Math.floor(Math.random() * 20) + 5;
    const I = Math.floor(Math.random() * 5) + 1;

    correctAnswer = V * I;

    formula = "P = V × I";
    resolution = `P = ${V} × ${I} = ${correctAnswer} W`;

    document.getElementById("question").innerText =
      `Calcule a potência: V = ${V}V e I = ${I}A`;
  }
}

function checkAnswer() {
  const user = parseFloat(document.getElementById("answer").value);

  if (isNaN(user)) return;

  if (Math.abs(user - correctAnswer) < 0.01) {
    document.getElementById("feedback").innerHTML =
      "<span class='correct'>✔ Correto!</span>";
  } else {
    document.getElementById("feedback").innerHTML =
      `<span class='wrong'>✖ Errado!</span><br><br>
       <b>Fórmula:</b> ${formula}<br>
       <b>Resolução:</b> ${resolution}`;
  }
}

function showAnswer() {
  document.getElementById("feedback").innerHTML =
    `<span>Resposta: ${correctAnswer.toFixed(2)}</span><br>
     <b>Fórmula:</b> ${formula}<br>
     <b>Resolução:</b> ${resolution}`;
}
</script>
</body>
</html>
