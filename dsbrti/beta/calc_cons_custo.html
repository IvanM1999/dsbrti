<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Financeiro - Uber/99 Blumenau</title>
    <style>
        :root {
            --primary: #2ecc71;
            --primary-dark: #27ae60;
            --background: #f5f6fa;
            --card-bg: #ffffff;
            --text: #2c3e50;
            --danger: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-top: 0;
            color: var(--text);
            border-bottom: 2px solid var(--background);
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--primary);
        }

        input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }

        .range-value {
            text-align: right;
            font-weight: bold;
            color: var(--primary-dark);
            margin-top: 2px;
        }

        .results {
            background: var(--background);
            padding: 15px;
            border-radius: 8px;
            margin-top: 25px;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 16px;
        }

        .result-item:last-child {
            margin-bottom: 0;
            padding-top: 12px;
            border-top: 2px dashed #ddd;
        }

        .lucro {
            font-size: 20px;
            font-weight: bold;
            color: var(--primary-dark);
        }

        .negativo {
            color: var(--danger) !important;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Simulador de Aplicativo</h2>
    
    <div class="form-group">
        <label for="kmSemanal">KM Rodados por Semana (no App):</label>
        <input type="range" id="kmSemanal" min="100" max="1500" step="50" value="400">
        <div class="range-value"><span id="kmValue">400</span> km</div>
    </div>

    <div class="form-group">
        <label for="consumo">Consumo do Carro (km/L na Gasolina):</label>
        <input type="range" id="consumo" min="8" max="16" step="0.5" value="11.5">
        <div class="range-value"><span id="consumoValue">11.5</span> km/L</div>
    </div>

    <div class="form-group">
        <label for="precoGasolina">Preço do Litro da Gasolina (R$):</label>
        <input type="number" id="precoGasolina" step="0.01" value="6.70">
    </div>

    <div class="results">
        <div class="result-item">
            <span>Faturamento Bruto Mensal:</span>
            <span id="faturamentoBruto">R$ 0,00</span>
        </div>
        <div class="result-item">
            <span>Custo de Combustível Mensal:</span>
            <span id="custoCombustivel" style="color: var(--danger);">- R$ 0,00</span>
        </div>
        <div class="result-item">
            <span>Reserva de Manutenção Mensal:</span>
            <span id="custoManutencao" style="color: var(--danger);">- R$ 0,00</span>
        </div>
        <div class="result-item">
            <span>Lucro Líquido Estimado:</span>
            <span id="lucroLiquido" class="lucro">R$ 0,00</span>
        </div>
    </div>
</div>

<script>
    // Elementos do DOM
    const kmInput = document.getElementById('kmSemanal');
    const kmValue = document.getElementById('kmValue');
    const consumoInput = document.getElementById('consumo');
    const consumoValue = document.getElementById('consumoValue');
    const precoInput = document.getElementById('precoGasolina');

    const fatBrutoEl = document.getElementById('faturamentoBruto');
    const custoCombEl = document.getElementById('custoCombustivel');
    const custoManutEl = document.getElementById('custoManutencao');
    const lucroLiqEl = document.getElementById('lucroLiquido');

    // Regras de Negócio Constantes
    const GANHO_POR_KM = 2.80; // Média estimada de ganho bruto por KM rodado em Blumenau
    const DEPRECIACAO_MANUTENCAO_POR_KM = 0.40; // Reserva recomendada para pneu, óleo e desvalorização

    function calcular() {
        // Captura de valores atuais
        const kmSemanal = parseFloat(kmInput.value);
        const consumo = parseFloat(consumoInput.value);
        const precoGasolina = parseFloat(precoInput.value) || 0;

        // Atualiza os textos dos Sliders
        kmValue.textContent = kmSemanal;
        consumoValue.textContent = consumo.toFixed(1);

        // Cálculos baseados em 4 semanas (1 mês)
        const kmMensal = kmSemanal * 4;
        
        const faturamentoMensal = kmMensal * GANHO_POR_KM;
        const litrosConsumidos = kmMensal / consumo;
        const custoCombustivelMensal = litrosConsumidos * precoGasolina;
        const custoManutencaoMensal = kmMensal * DEPRECIACAO_MANUTENCAO_POR_KM;
        
        const lucroLiquidoMensal = faturamentoMensal - custoCombustivelMensal - custoManutencaoMensal;

        // Renderização dos Resultados Formatados
        fatBrutoEl.textContent = formatarMoeda(faturamentoMensal);
        custoCombEl.textContent = `- ${formatarMoeda(custoCombustivelMensal)}`;
        custoManutEl.textContent = `- ${formatarMoeda(custoManutencaoMensal)}`;
        lucroLiqEl.textContent = formatarMoeda(lucroLiquidoMensal);

        // Validação visual de saldo negativo
        if (lucroLiquidoMensal < 0) {
            lucroLiqEl.classList.add('negativo');
        } else {
            lucroLiqEl.classList.remove('negativo');
        }
    }

    function formatarMoeda(valor) {
        return valor.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    // Event Listeners para atualizar em tempo real ao mexer nos controles
    kmInput.addEventListener('input', calcular);
    consumoInput.addEventListener('input', calcular);
    precoInput.addEventListener('input', calcular);

    // Executa o cálculo inicial ao abrir a página
    calcular();
</script>

</body>
</html>
