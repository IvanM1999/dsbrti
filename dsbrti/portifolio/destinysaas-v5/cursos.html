<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel DestinyServicesTI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            500: '#14b8a6',
                            600: '#0d9488',
                            900: '#134e4a',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .glass {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        body {
            background-color: #090d16;
            color: #f8fafc;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col md:flex-row relative overflow-x-hidden">

    <div id="toast-container" class="fixed top-5 right-5 z-50 flex flex-col gap-3 max-w-sm w-full"></div>

    <header class="md:hidden w-full glass border-b border-white/5 p-4 flex justify-between items-center z-30">
        <h1 class="text-xl font-bold text-teal-400">DestinySaaS</h1>
        <button id="mobile-menu-btn" class="p-2 text-slate-300 hover:text-white focus:outline-none">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
        </button>
    </header>

    <aside id="sidebar" class="fixed inset-y-0 left-0 transform -translate-x-full md:translate-x-0 md:relative md:flex z-40 w-64 glass border-r border-white/5 flex-col transition-transform duration-300 ease-in-out">
        <div class="p-6 border-b border-white/5 flex justify-between items-center">
            <h1 class="text-xl font-bold text-teal-400">DestinySaaS</h1>
            <button id="close-sidebar" class="md:hidden text-slate-400 hover:text-white">✕</button>
        </div>
        <nav class="flex-1 p-4 space-y-1">
            <a href="#cursos" onclick="switchSection('cursos')" class="nav-item flex items-center gap-3 p-3 bg-white/5 rounded-xl text-teal-300 font-medium">
                <span>📚</span> Catálogo de Cursos
            </a>
            <a href="#perfil" onclick="switchSection('perfil')" class="nav-item flex items-center gap-3 p-3 hover:bg-white/5 rounded-xl text-slate-300 transition">
                <span>👤</span> Meu WebPerfil
            </a>
            <a href="#analytics" onclick="switchSection('analytics')" class="nav-item flex items-center gap-3 p-3 hover:bg-white/5 rounded-xl text-slate-300 transition">
                <span>📊</span> Desempenho (Analytics)
            </a>
        </nav>
        <div class="p-4 border-t border-white/5">
            <button onclick="logout()" class="w-full p-3 bg-red-500/10 hover:bg-red-500/20 text-red-400 rounded-xl transition text-center font-medium">
                Sair da Conta
            </button>
        </div>
    </aside>

    <main class="flex-1 p-6 md:p-10 z-10 overflow-y-auto">
        <section id="sec-cursos" class="space-y-6">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                <div>
                    <h2 class="text-2xl md:text-3xl font-extrabold tracking-tight">Catálogo de Cursos</h2>
                    <p class="text-slate-400 text-sm">Desenvolva as competências mais procuradas pelo mercado.</p>
                </div>
                <input type="text" id="search-input" placeholder="Pesquisar curso..." class="w-full md:w-64 px-4 py-2.5 bg-white/5 border border-white/10 rounded-xl focus:border-teal-500 focus:outline-none text-sm transition">
            </div>

            <div id="cursos-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="animate-pulse glass rounded-2xl p-5 space-y-4">
                    <div class="h-6 bg-white/10 rounded w-1/3"></div>
                    <div class="h-4 bg-white/10 rounded w-3/4"></div>
                    <div class="h-10 bg-white/10 rounded-xl w-full"></div>
                </div>
            </div>
        </section>
    </main>

    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script>
        // Lógica de abertura/fecho do menu mobile
        const sidebar = document.getElementById('sidebar');
        document.getElementById('mobile-menu-btn').addEventListener('click', () => {
            sidebar.classList.remove('-translate-x-full');
        });
        document.getElementById('close-sidebar').addEventListener('click', () => {
            sidebar.classList.add('-translate-x-full');
        });
    </script>
</body>
</html>
