<div id="lightbox"

    </div>

  </div>
</div>

<!-- ========================= -->
<!-- SCRIPT -->
<!-- ========================= -->
<script>
  const ITENS_POR_PAGINA = 15;
  let imagens = [];
  let paginaAtual = 1;
  let totalPaginas = 1;
  let panzoomInstance = null;

  async function carregarGaleria() {
    const response = await fetch("/src/galeria/ft.json");
    imagens = await response.json();
    totalPaginas = Math.ceil(imagens.length / ITENS_POR_PAGINA);
    renderizarPagina();
  }

  function renderizarPagina() {
    const container = document.getElementById("galeria");
    container.innerHTML = "";

    const inicio = (paginaAtual - 1) * ITENS_POR_PAGINA;
    const paginaItens = imagens.slice(inicio, inicio + ITENS_POR_PAGINA);

    paginaItens.forEach(img => {
      const card = document.createElement("div");
      card.className = "bg-white shadow-md rounded-lg overflow-hidden hover:shadow-xl transition cursor-pointer";

      card.innerHTML = `
        <img src="/src/galeria/${img.arquivo}" class="w-full h-48 object-cover" alt="${img.titulo}">
        <div class="p-4">
          <h3 class="text-lg font-semibold text-blue-800">${img.titulo}</h3>
          <p class="text-sm text-gray-600 mt-1">${img.descricao}</p>
        </div>
      `;

      card.addEventListener("click", () => abrirLightbox(img));
      container.appendChild(card);
    });

    atualizarPaginacao();
  }

  function atualizarPaginacao() {
    document.getElementById("pagina-atual").textContent =
      `Página ${paginaAtual} de ${totalPaginas}`;

    document.getElementById("info-paginacao").textContent =
      `${imagens.length} fotos`;

    document.getElementById("btn-prev").disabled = paginaAtual === 1;
    document.getElementById("btn-next").disabled = paginaAtual === totalPaginas;
  }

  function abrirLightbox(img) {
    const lightbox = document.getElementById("lightbox");
    const imgEl = document.getElementById("lightbox-img");

    imgEl.src = `/src/galeria/${img.arquivo}`;
    document.getElementById("lightbox-title").textContent = img.titulo;
    document.getElementById("lightbox-desc").textContent = img.descricao;

    lightbox.classList.remove("pointer-events-none");
    lightbox.classList.add("opacity-100");

    // Zoom
    const zoomArea = document.getElementById("zoom-area");
    if (panzoomInstance) panzoomInstance.dispose();

    panzoomInstance = Panzoom(zoomArea, {
      maxScale: 5,
      minScale: 1,
      contain: 'outside'
    });

    zoomArea.addEventListener('wheel', panzoomInstance.zoomWithWheel);
  }

  function fecharLightbox() {
    const lightbox = document.getElementById("lightbox");
    lightbox.classList.add("pointer-events-none");
    lightbox.classList.remove("opacity-100");
  }

  document.addEventListener("DOMContentLoaded", () => {
    document.getElementById("btn-prev").addEventListener("click", () => {
      if (paginaAtual > 1) { paginaAtual--; renderizarPagina(); }
    });

    document.getElementById("btn-next").addEventListener("click", () => {
      if (paginaAtual < totalPaginas) { paginaAtual++; renderizarPagina(); }
    });

    document.getElementById("lightbox-close").addEventListener("click", fecharLightbox);

    document.getElementById("lightbox").addEventListener("click", (e) => {
      if (e.target.id === "lightbox") fecharLightbox();
    });
const layouts = [2, 3, 4, 5];
let layoutIndex = 1; // começa em 3 colunas (layouts[1])

document.getElementById("btn-layout").addEventListener("click", () => {
  layoutIndex = (layoutIndex + 1) % layouts.length;
  const colunas = layouts[layoutIndex];

  const galeria = document.getElementById("galeria");
  galeria.className = `grid gap-6 grid-cols-${colunas} transition-all duration-300`;

  // opcional: feedback visual
  document.getElementById("btn-layout").title =
    `Exibindo ${colunas} itens por linha`;
});
    carregarGaleria();
  });
</script>
