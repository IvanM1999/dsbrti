<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Treino</title>
<link rel="stylesheet" href="./css/style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

<header class="navbar">
  <div class="logo">CircuitLab</div>
  <nav>
    <a href="index.html">Início</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="treino.html">Treino</a>
    <a href="analise.html">Análise</a>
  </nav>
</header>

<main class="container">

<h1>Treinamento</h1>

<div class="grid grid-2">
<div class="card">
  <div class="title">Modo Desafio</div>

  <p>Tempo restante:</p>
  <h2 id="timer">60s</h2>

  <button class="btn" onclick="startChallenge()">Iniciar Desafio</button>
</div>
  <!-- EXERCÍCIO -->
  <div class="card">
    <div class="title">Exercício</div>

    <p id="question">Clique em novo exercício</p>

    <input id="answer" class="input" placeholder="Resposta">

    <button class="btn" onclick="check()">Verificar</button>
    <button class="btn" onclick="newExercise()">Novo</button>

    <div id="feedback"></div>
  </div>

  <!-- STATUS -->
  <div class="card">
    <div class="title">Seu Desempenho</div>

    <p>Aproveitamento:</p>
    <h2 id="acc">0%</h2>

    <p>Total:</p>
    <span id="total"></span>

    <p>Acertos:</p>
    <span id="correct"></span>
  </div>

</div>
<div class="card">
  <div class="title">Ranking</div>

  <ul id="rankingList"></ul>

  <p><b>Recorde:</b> <span id="record">0</span></p>
</div>

</main>

<script type="module">
import { Engine } from './js/engine.js';
import { Exercises } from './js/exercises.js';
import { Progress } from './js/progress.js';
import { Challenge } from './js/challenge.js';

let current;

const card = document.getElementById("exerciseCard");

window.newExercise = () => {
  const ex = Exercises[Math.floor(Math.random()*Exercises.length)];
  current = ex.generate();

  document.getElementById("question").innerText = current.question;
  document.getElementById("feedback").innerHTML = "";
  document.getElementById("answer").value = "";

  card.classList.remove("success", "error");
};

window.check = () => {

  const input = document.getElementById("answer").value;

  if (!input) {
    document.getElementById("feedback").innerHTML =
      "<span class='feedback-err'>Digite uma resposta</span>";
    return;
  }

  const user = parseFloat(input);
  const correct = current.solve(Engine);

  const ok = Math.abs(user - correct) < 0.1;

  Progress.update(current.type, ok);

  if (ok) {
    document.getElementById("feedback").innerHTML =
      "<span class='feedback-ok'>✔ Correto</span>";

    card.classList.add("success");
    card.classList.remove("error");

    // MODO DESAFIO
    if (Challenge?.active) {
      Challenge.hit();
      setTimeout(() => newExercise(), 400);
    }

  } else {
    document.getElementById("feedback").innerHTML =
      `<span class='feedback-err'>✖ Errado<br>${current.formula}</span>`;

    card.classList.add("error");
    card.classList.remove("success");

    setTimeout(() => card.classList.remove("error"), 400);
  }

  updateStats();
};

window.startChallenge = () => {
  Challenge.start({
    newExercise
  }, {
    updateTimer: (t) => {
      document.getElementById("timer").innerText = t + "s";
    },
    feedback: (msg) => {
      document.getElementById("feedback").innerHTML = msg;
    }
  });
};

function updateStats() {
  const p = Progress.load();
  const acc = parseFloat(Progress.accuracy());

  document.getElementById("acc").innerText = acc + "%";
  document.getElementById("total").innerText = p.total;
  document.getElementById("correct").innerText = p.correct;
}

// ENTER PARA RESPONDER
document.getElementById("answer")
  .addEventListener("keydown", e => {
    if (e.key === "Enter") check();
  });

// INIT
updateStats();

window.updateRanking = updateRanking;

// carregar ranking ao abrir
updateRanking(
  JSON.parse(localStorage.getItem("circuitlab_ranking")) || []
);

function updateRanking(list) {
  const el = document.getElementById("rankingList");

  let html = "";

  list.forEach((r, i) => {
    html += `<li>#${i+1} - ${r.score} pts (${getMedal(r.score)})</li>`;
  });

  el.innerHTML = html;

  document.getElementById("record").innerText =
    list.length ? list[0].score : 0;
}

function getMedal(score) {
  if (score >= 100) return "🥇";
  if (score >= 60) return "🥈";
  if (score >= 30) return "🥉";
  return "-";
}

</script>
<script type="module">
import { Engine } from './js/engine.js';

import { Progress } from './js/progress.js';
import { Challenge } from './js/challenge.js';
import { Ranking } from './js/ranking.js';

  document.getElementById("question").innerText = current.question;
  document.getElementById("feedback").innerHTML = "";
  document.getElementById("answer").value = "";

    document.getElementById("feedback").innerHTML =
      "<span class='feedback-err'>Digite uma resposta</span>";
    return;
  }

  const user = parseFloat(input);
  const correct = current.solve(Engine);

  const ok = Math.abs(user - correct) < 0.1;

  Progress.update(current.type, ok);

  if (ok) {

  const el = document.getElementById("rankingList");

  let html = "";

  list.forEach((r, i) => {

  });

  el.innerHTML = html;

  document.getElementById("record").innerText =
    list.length ? list[0].score : 0;
}

// ENTER
document.getElementById("answer")
  .addEventListener("keydown", e => {
    if (e.key === "Enter") check();
  });

// INIT
updateStats();
updateRanking(Ranking.load());
</script>
</body>
</html>
