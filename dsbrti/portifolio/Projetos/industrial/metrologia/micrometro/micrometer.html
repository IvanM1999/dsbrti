<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Simulador de Micrômetro | DestinyServicesBR</title>
    <style>
        :root {
            --bg-body: #f8fafc;
            --panel-bg: #ffffff;
            --destiny-blue: #0f172a;
            --accent: #dc2626;
            --border-color: #cbd5e1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: var(--bg-body);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 10px;
        }

        .app-container {
            width: 100%;
            max-width: 800px;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .app-header {
            background: var(--destiny-blue);
            color: #ffffff;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #f59e0b;
        }

        .app-header h1 {
            font-size: 1.1rem;
            font-weight: bold;
        }

        .app-header span {
            font-size: 0.8rem;
            background: rgba(255, 255, 255, 0.15);
            padding: 3px 8px;
            border-radius: 4px;
        }

        .canvas-container {
            width: 100%;
            background: #ffffff;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            overflow: hidden;
        }

        canvas {
            width: 100%;
            max-width: 760px;
            height: auto;
            aspect-ratio: 76 / 23;
            display: block;
            background: #ffffff;
            cursor: ew-resize;
            touch-action: none;
        }

        .control-panel {
            background: #f1f5f9;
            padding: 15px 20px;
            display: grid;
            grid-template-columns: 1.3fr 1fr;
            gap: 20px;
            align-items: center;
        }

        @media (max-width: 650px) {
            .control-panel {
                grid-template-columns: 1fr;
                gap: 15px;
                padding: 12px;
            }
        }

        .btn-grid {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .btn-row {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 4px;
        }

        .btn-step {
            background: #ffffff;
            border: 1px solid #94a3b8;
            color: #1e293b;
            padding: 10px 0;
            font-size: 0.75rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            text-align: center;
            transition: all 0.1s;
        }

        .btn-step:hover {
            background: #e2e8f0;
            border-color: #64748b;
        }

        .btn-step:active {
            transform: scale(0.95);
        }

        .response-box {
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .display-text {
            font-size: 2rem;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            color: #0f172a;
        }

        .display-text.hidden {
            color: #94a3b8;
        }

        .btn-toggle {
            background: #f59e0b;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            max-width: 200px;
        }

        .btn-toggle:hover {
            background: #d97706;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="app-header">
            <h1>DestinyServicesBR</h1>
            <span>Micrômetro Centesimal (0-25 mm)</span>
        </div>

        <div class="canvas-container">
            <canvas id="micrometerCanvas" width="760" height="230"></canvas>
        </div>

        <div class="control-panel">
            <div class="btn-grid">
                <div class="btn-row">
                    <button class="btn-step" onclick="adjust(-1.00)">-1.0</button>
                    <button class="btn-step" onclick="adjust(-0.50)">-0.5</button>
                    <button class="btn-step" onclick="adjust(-0.10)">-0.1</button>
                    <button class="btn-step" onclick="adjust(-0.05)">-0.05</button>
                    <button class="btn-step" onclick="adjust(-0.01)">-0.01</button>
                    <button class="btn-step" onclick="adjust(-0.005)">-0.005</button>
                </div>
                <div class="btn-row">
                    <button class="btn-step" onclick="adjust(1.00)">+1.0</button>
                    <button class="btn-step" onclick="adjust(0.50)">+0.5</button>
                    <button class="btn-step" onclick="adjust(0.10)">+0.1</button>
                    <button class="btn-step" onclick="adjust(0.05)">+0.05</button>
                    <button class="btn-step" onclick="adjust(0.01)">+0.01</button>
                    <button class="btn-step" onclick="adjust(0.005)">+0.005</button>
                </div>
            </div>

            <div class="response-box">
                <div id="readout" class="display-text">0.00 mm</div>
                <button id="toggleBtn" class="btn-toggle" onclick="toggleView()">Ocultar Resposta</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('micrometerCanvas');
        const ctx = canvas.getContext('2d');
        const readout = document.getElementById('readout');
        const toggleBtn = document.getElementById('toggleBtn');

        let value = 0.00;
        let isHidden = false;

        let isDragging = false;
        let startX = 0;

        function getCanvasX(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            return (clientX - rect.left) * (canvas.width / rect.width);
        }

        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = getCanvasX(e);
        });

        window.addEventListener('mouseup', () => isDragging = false);

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const currentX = getCanvasX(e);
            const deltaX = currentX - startX;
            startX = currentX;
            adjust(deltaX * 0.008);
        });

        canvas.addEventListener('touchstart', (e) => {
            isDragging = true;
            startX = getCanvasX(e);
        });
        window.addEventListener('touchend', () => isDragging = false);
        window.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            const currentX = getCanvasX(e);
            const deltaX = currentX - startX;
            startX = currentX;
            adjust(deltaX * 0.008);
        });

        function adjust(amount) {
            value = Math.max(0, Math.min(25, value + amount));
            updateUI();
        }

        function toggleView() {
            isHidden = !isHidden;
            if (isHidden) {
                readout.innerText = "??.?? mm";
                readout.classList.add('hidden');
                toggleBtn.innerText = "Mostrar Resposta";
            } else {
                readout.classList.remove('hidden');
                toggleBtn.innerText = "Ocultar Resposta";
                updateUI();
            }
        }

        function updateUI() {
            if (!isHidden) {
                readout.innerText = value.toFixed(2) + " mm";
            }
            draw();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const CY = 115; // Altura centralizada
            const scalePX = 8.0; // Fator de escala (8px = 1mm)
            
            // --- AJUSTE DE POSIÇÃO CALIBRADO ---
            const anvilFaceX = 125; // O ponto real de medição ZERO agora ocorre mais para a direita
            const zeroSleeveX = 325; // Sincroniza o tambor de medição com o novo zero do fuso

            // --- 1. ARCO DE METRO SÓLIDO (C-FRAME) - Posicionado elegantemente à esquerda ---
            ctx.fillStyle = '#1e293b';
            ctx.strokeStyle = '#0f172a';
            ctx.lineWidth = 4;
            ctx.beginPath();
            
            // Perfil Externo do Arco (Curvatura compacta à esquerda)
            ctx.moveTo(315, CY - 22);
            ctx.lineTo(315, CY + 26);
            ctx.bezierCurveTo(315, CY + 110, 75, CY + 110, 75, CY + 26); // Barriga externa compactada
            ctx.lineTo(75, CY - 22); // Face extrema externa esquerda
            ctx.lineTo(95, CY - 22); // Parede interna do arco de suporte do batente
            ctx.lineTo(95, CY + 15);
            
            // Perfil Interno
            ctx.bezierCurveTo(95, CY + 80, 295, CY + 80, 295, CY - 22);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // Placa Isolante Térmica (Alinhada perfeitamente na base do arco compacto)
            ctx.fillStyle = '#0f172a';
            ctx.beginPath();
            ctx.roundRect(125, CY + 50, 110, 30, 6);
            ctx.fill();

            // Identificação Industrial na Placa
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 10px Arial';
            ctx.textAlign = 'center';
            ctx.fillText("DESTINY", 180, CY + 62);
            ctx.fillStyle = '#f59e0b';
            ctx.font = 'bold 8px Arial';
            ctx.fillText("0-25mm  0.01mm", 180, CY + 74);

            // Batente Fixo Esquerdo (Anvil) - Projetado para a direita para sair de dentro do arco
            // O corpo de aço avança de dentro do arco (95px) até o ponto zero calibrado (125px)
            ctx.fillStyle = '#cbd5e1'; 
            ctx.fillRect(95, CY - 8, 30, 16); // Avança até a face de contato
            ctx.fillStyle = '#475569'; // Pastilha de carboneto do batente
            ctx.fillRect(122, CY - 8, 3, 16);

            // --- 2. HASTE MÓVEL (SPINDLE) ---
            // Começa exatamente no ponto de toque zero (125px) e avança conforme o valor do micrômetro
            const spindleX = anvilFaceX + (value * scalePX);
            ctx.fillStyle = '#e2e8f0';
            ctx.fillRect(spindleX, CY - 8, 250, 16); 
            ctx.fillStyle = '#475569'; // Face de carboneto móvel
            ctx.fillRect(spindleX, CY - 8, 3, 16);

            // Trava da Haste
            ctx.fillStyle = '#64748b';
            ctx.beginPath();
            ctx.arc(270, CY - 18, 6, 0, Math.PI * 2);
            ctx.fill();

            // --- 3. BAINHA FIXA (SLEEVE) ---
            const sleeveX = 310;
            const sleeveW = 235;
            const sleeveH = 44;
            const sleeveY = CY - 22;

            ctx.fillStyle = '#f1f5f9';
            ctx.fillRect(sleeveX, sleeveY, sleeveW, sleeveH);
            ctx.strokeStyle = '#475569';
            ctx.lineWidth = 1.5;
            ctx.strokeRect(sleeveX, sleeveY, sleeveW, sleeveH);

            // Linha de Fé Horizontal
            ctx.beginPath();
            ctx.moveTo(sleeveX, CY);
            ctx.lineTo(sleeveX + sleeveW, CY);
            ctx.stroke();

            // Gravação de Escalas na Bainha Fixa
            ctx.fillStyle = '#000000';
            ctx.font = 'bold 9px Arial';
            ctx.textAlign = 'center';

            for (let i = 0; i <= 25; i++) {
                let posX = zeroSleeveX + (i * scalePX);

                if (posX < sleeveX + sleeveW) {
                    // Milímetros Inteiros (Linhas Superiores)
                    ctx.beginPath();
                    ctx.moveTo(posX, CY);
                    ctx.lineTo(posX, CY - 8);
                    ctx.stroke();

                    if (i % 5 === 0) {
                        ctx.fillText(i.toString(), posX, CY - 11);
                    }

                    // Meios Milímetros (Linhas Inferiores)
                    if (i < 25) {
                        let meioX = posX + (scalePX / 2);
                        ctx.beginPath();
                        ctx.moveTo(meioX, CY);
                        ctx.lineTo(meioX, CY + 6);
                        ctx.stroke();
                    }
                }
            }

            // --- 4. TAMBOR MÓVEL (THIMBLE) ---
            const thimbleLeft = zeroSleeveX + (value * scalePX);
            const bevelW = 15;
            const thimbleW = 130;
            const thimbleH = 56;
            const thimbleY = CY - 28;

            // Desenha o Chanfro Cônico do Tambor
            ctx.fillStyle = '#cbd5e1';
            ctx.beginPath();
            ctx.moveTo(thimbleLeft, CY - 22);
            ctx.lineTo(thimbleLeft + bevelW, thimbleY);
            ctx.lineTo(thimbleLeft + bevelW + thimbleW, thimbleY);
            ctx.lineTo(thimbleLeft + bevelW + thimbleW, CY + 28);
            ctx.lineTo(thimbleLeft + bevelW, CY + 28);
            ctx.lineTo(thimbleLeft, CY + 22);
            ctx.closePath();
            ctx.fill();

            // Bordas e Contorno Metálico do Tambor
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(thimbleLeft, CY - 22);
            ctx.lineTo(thimbleLeft + bevelW, thimbleY);
            ctx.lineTo(thimbleLeft + bevelW + thimbleW, thimbleY);
            ctx.lineTo(thimbleLeft + bevelW + thimbleW, CY + 28);
            ctx.lineTo(thimbleLeft + bevelW, CY + 28);
            ctx.lineTo(thimbleLeft, CY + 22);
            ctx.closePath();
            ctx.stroke();

            // Linha divisória do chanfro
            ctx.beginPath();
            ctx.moveTo(thimbleLeft + bevelW, thimbleY);
            ctx.lineTo(thimbleLeft + bevelW, CY + 28);
            ctx.stroke();

            // Recartilhado (Fricção Recoberta)
            ctx.fillStyle = '#475569';
            ctx.fillRect(thimbleLeft + bevelW + thimbleW - 25, thimbleY + 1, 24, thimbleH - 2);

            // Catraca / Fricção Traseira (Fim do Tambor)
            ctx.fillStyle = '#94a3b8';
            ctx.fillRect(thimbleLeft + bevelW + thimbleW, CY - 18, 40, 36);
            ctx.strokeStyle = '#000000';
            ctx.strokeRect(thimbleLeft + bevelW + thimbleW, CY - 18, 40, 36);

            // --- 5. DIVISÃO CENTESIMAL DO TAMBOR (0 A 50) ---
            ctx.textAlign = 'right';
            ctx.font = 'bold 9px Arial';

            const thimbleVal = value % 0.5;
            const rotation = (thimbleVal / 0.5) * 50;

            for (let t = -10; t <= 10; t++) {
                let targetDivision = Math.round(rotation) - t;
                let actualDivision = (targetDivision + 50) % 50;

                let deltaDiv = t + (rotation % 1);
                let angle = (deltaDiv / 10) * (Math.PI / 3.2);

                if (Math.abs(angle) < Math.PI / 2) {
                    let posY = CY - 28 * Math.sin(angle);

                    ctx.strokeStyle = '#000000';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(thimbleLeft, posY);
                    ctx.lineTo(thimbleLeft + 8, posY);
                    ctx.stroke();

                    if (actualDivision % 5 === 0) {
                        ctx.fillStyle = (actualDivision === 0) ? '#dc2626' : '#000000';
                        ctx.fillText(actualDivision.toString(), thimbleLeft - 3, posY + 3);
                    }
                }
            }
        }

        updateUI();
    </script>
</body>
</html>
