<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Simulador de Micrômetro | DestinyServicesBR</title>
    <style>
        :root {
            --bg-body: #f8fafc;
            --panel-bg: #ffffff;
            --destiny-blue: #0f172a;
            --accent: #dc2626;
            --border-color: #cbd5e1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden; /* Evita scrolls indesejados ao arrastar o dedo */
            background-color: var(--bg-body);
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
        }

        .app-container {
            width: 100%;
            height: 100%;
            max-width: 800px;
            max-height: 600px;
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .app-header {
            background: var(--destiny-blue);
            color: #ffffff;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #f59e0b;
            flex-shrink: 0;
        }

        .app-header h1 {
            font-size: 1rem;
            font-weight: bold;
        }

        .app-header span {
            font-size: 0.75rem;
            background: rgba(255, 255, 255, 0.15);
            padding: 2px 6px;
            border-radius: 4px;
        }

        .canvas-container {
            flex: 1;
            width: 100%;
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid var(--border-color);
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: 100%;
            max-height: 230px;
            object-fit: contain; /* Garante que o desenho do micrômetro nunca deformará */
            display: block;
            cursor: ew-resize;
            touch-action: none;
        }

        .control-panel {
            background: #f1f5f9;
            padding: 12px 16px;
            display: grid;
            grid-template-columns: 1.3fr 1fr;
            gap: 15px;
            align-items: center;
            flex-shrink: 0;
        }

        .btn-grid {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .btn-row {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 4px;
        }

        .btn-step {
            background: #ffffff;
            border: 1px solid #94a3b8;
            color: #1e293b;
            padding: 8px 0;
            font-size: 0.75rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            text-align: center;
            transition: all 0.1s;
            touch-action: manipulation;
        }

        .btn-step:hover {
            background: #e2e8f0;
            border-color: #64748b;
        }

        .btn-step:active {
            transform: scale(0.95);
        }

        .response-box {
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .display-text {
            font-size: 1.8rem;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            color: #0f172a;
        }

        .display-text.hidden {
            color: #94a3b8;
        }

        .btn-toggle {
            background: #f59e0b;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            max-width: 180px;
        }

        .btn-toggle:hover {
            background: #d97706;
        }

        /* --- ADAPTAÇÃO PARA PORTRAIT (TELAS DE CELULAR VERTICAIS) --- */
        @media (max-width: 650px) {
            body {
                padding: 0;
            }
            .app-container {
                border-radius: 0;
                border: none;
                max-height: 100%;
            }
            .control-panel {
                grid-template-columns: 1fr;
                gap: 12px;
                padding: 12px;
            }
            .btn-step {
                padding: 10px 0; /* Botões ligeiramente maiores para toque com dedos em pé */
                font-size: 0.7rem;
            }
        }

        /* --- ADAPTAÇÃO PARA PAISAGEM / ROTAÇÃO DE TELA (CELULAR DEITADO) --- */
        @media (max-height: 380px) and (orientation: landscape) {
            body {
                padding: 0;
            }
            .app-container {
                border-radius: 0;
                border: none;
                max-height: 100%;
            }
            .app-header {
                padding: 4px 16px;
            }
            .app-header h1 {
                font-size: 0.85rem;
            }
            .canvas-container {
                padding: 4px;
            }
            .control-panel {
                grid-template-columns: 1.5fr 1fr;
                padding: 6px 12px;
                gap: 10px;
            }
            .btn-grid {
                gap: 4px;
            }
            .btn-step {
                padding: 6px 0;
                font-size: 0.65rem;
            }
            .response-box {
                padding: 4px;
                flex-direction: row;
                justify-content: space-around;
                gap: 4px;
            }
            .display-text {
                font-size: 1.3rem;
            }
            .btn-toggle {
                padding: 4px 8px;
                font-size: 0.7rem;
                max-width: 110px;
            }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="app-header">
            <h1>DestinyServicesBR</h1>
            <span>Micrômetro Centesimal (0-25 mm)</span>
        </div>

        <div class="canvas-container">
            <canvas id="micrometerCanvas"></canvas>
        </div>

        <div class="control-panel">
            <div class="btn-grid">
                <div class="btn-row">
                    <button class="btn-step" onclick="adjust(-1.00)">-1.0</button>
                    <button class="btn-step" onclick="adjust(-0.50)">-0.5</button>
                    <button class="btn-step" onclick="adjust(-0.10)">-0.1</button>
                    <button class="btn-step" onclick="adjust(-0.05)">-0.05</button>
                    <button class="btn-step" onclick="adjust(-0.01)">-0.01</button>
                    <button class="btn-step" onclick="adjust(-0.005)">-0.005</button>
                </div>
                <div class="btn-row">
                    <button class="btn-step" onclick="adjust(1.00)">+1.0</button>
                    <button class="btn-step" onclick="adjust(0.50)">+0.5</button>
                    <button class="btn-step" onclick="adjust(0.10)">+0.1</button>
                    <button class="btn-step" onclick="adjust(0.05)">+0.05</button>
                    <button class="btn-step" onclick="adjust(0.01)">+0.01</button>
                    <button class="btn-step" onclick="adjust(0.005)">+0.005</button>
                </div>
            </div>

            <div class="response-box">
                <div id="readout" class="display-text">0.00 mm</div>
                <button id="toggleBtn" class="btn-toggle" onclick="toggleView()">Ocultar Resposta</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('micrometerCanvas');
        const ctx = canvas.getContext('2d');
        const readout = document.getElementById('readout');
        const toggleBtn = document.getElementById('toggleBtn');

        let value = 0.00;
        let isHidden = false;

        let isDragging = false;
        let startX = 0;

        // --- SISTEMA DE REDIMENSIONAMENTO DINÂMICO DO CANVAS ---
        function resizeCanvas() {
            // Mantém a proporção fixa de 760x230 do seu layout original para não deformar o desenho
            const baseWidth = 760;
            const baseHeight = 230;
            
            canvas.width = baseWidth;
            canvas.height = baseHeight;
            
            draw();
        }

        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('orientationchange', () => {
            setTimeout(resizeCanvas, 100); // Aguarda a rotação estabilizar
        });

        function getCanvasX(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            return (clientX - rect.left) * (canvas.width / rect.width);
        }

        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = getCanvasX(e);
        });

        window.addEventListener('mouseup', () => isDragging = false);

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const currentX = getCanvasX(e);
            const deltaX = currentX - startX;
            startX = currentX;
            adjust(deltaX * 0.008);
        });

        canvas.addEventListener('touchstart', (e) => {
            isDragging = true;
            startX = getCanvasX(e);
        }, { passive: true });
        
        window.addEventListener('touchend', () => isDragging = false);
        window.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            const currentX = getCanvasX(e);
            const deltaX = currentX - startX;
            startX = currentX;
            adjust(deltaX * 0.008);
        }, { passive: true });

        function adjust(amount) {
            value = Math.max(0, Math.min(25, value + amount));
            updateUI();
        }

        function toggleView() {
            isHidden = !isHidden;
            if (isHidden) {
                readout.innerText = "??.?? mm";
                readout.classList.add('hidden');
                toggleBtn.innerText = "Mostrar Resposta";
            } else {
                readout.classList.remove('hidden');
                toggleBtn.innerText = "Ocultar Resposta";
                updateUI();
            }
        }

        function updateUI() {
            if (!isHidden) {
                readout.innerText = value.toFixed(2) + " mm";
            }
            draw();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const CY = 115; // Altura centralizada
            const scalePX = 8.0; // Fator de escala original (8px = 1mm)
            
            const anvilFaceX = 110; 
            const zeroSleeveX = 320; 

            // --- 1. ARCO DE METRO SÓLIDO (C-FRAME) ---
            ctx.fillStyle = '#1e293b';
            ctx.strokeStyle = '#0f172a';
            ctx.lineWidth = 4;
            ctx.beginPath();
            
            // Perfil Externo do Arco
            ctx.moveTo(310, CY - 22);
            ctx.lineTo(310, CY + 26);
            ctx.bezierCurveTo(310, CY + 110, 70, CY + 110, 70, CY + 26);
            ctx.lineTo(70, CY - 22);
            ctx.lineTo(90, CY - 22);
            ctx.lineTo(90, CY + 15);
            
            // Perfil Interno
            ctx.bezierCurveTo(90, CY + 80, 290, CY + 80, 290, CY - 22);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // Placa Isolante Térmica
            ctx.fillStyle = '#0f172a';
            ctx.beginPath();
            ctx.roundRect(120, CY + 50, 110, 30, 6);
            ctx.fill();

            // Identificação Industrial na Placa
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 10px Arial';
            ctx.textAlign = 'center';
            ctx.fillText("DESTINY", 175, CY + 62);
            ctx.fillStyle = '#f59e0b';
            ctx.font = 'bold 8px Arial';
            ctx.fillText("0-25mm  0.01mm", 175, CY + 74);

            // Batente Fixo Esquerdo (Anvil)
            ctx.fillStyle = '#cbd5e1';
            ctx.fillRect(90, CY - 8, 20, 16);
            ctx.fillStyle = '#475569';
            ctx.fillRect(anvilFaceX - 3, CY - 8, 3, 16);

            // --- 2. HASTE MÓVEL (SPINDLE) ---
            const spindleX = anvilFaceX + (value * scalePX);
            ctx.fillStyle = '#e2e8f0';
            ctx.fillRect(spindleX, CY - 8, 250, 16); 
            ctx.fillStyle = '#475569';
            ctx.fillRect(spindleX, CY - 8, 3, 16);

            // Trava da Haste
            ctx.fillStyle = '#64748b';
            ctx.beginPath();
            ctx.arc(265, CY - 18, 6, 0, Math.PI * 2);
            ctx.fill();

            // --- 3. BAINHA FIXA (SLEEVE) ---
            const sleeveX = 305;
            const sleeveW = 235;
            const sleeveH = 44;
            const sleeveY = CY - 22;

            ctx.fillStyle = '#f1f5f9';
            ctx.fillRect(sleeveX, sleeveY, sleeveW, sleeveH);
            ctx.strokeStyle = '#475569';
            ctx.lineWidth = 1.5;
            ctx.strokeRect(sleeveX, sleeveY, sleeveW, sleeveH);

            // Linha de Fé Horizontal
            ctx.beginPath();
            ctx.moveTo(sleeveX, CY);
            ctx.lineTo(sleeveX + sleeveW, CY);
            ctx.stroke();

            // Gravação de Escalas na Bainha Fixa
            ctx.fillStyle = '#000000';
            ctx.font = 'bold 9px Arial';
            ctx.textAlign = 'center';

            for (let i = 0; i <= 25; i++) {
                let posX = zeroSleeveX + (i * scalePX);

                if (posX < sleeveX + sleeveW) {
                    // Milímetros Inteiros (Linhas Superiores)
                    ctx.beginPath();
                    ctx.moveTo(posX, CY);
                    ctx.lineTo(posX, CY - 8);
                    ctx.stroke();

                    if (i % 5 === 0) {
                        ctx.fillText(i.toString(), posX, CY - 11);
                    }

                    // Meios Milímetros (Linhas Inferiores)
                    if (i < 25) {
                        let meioX = posX + (scalePX / 2);
                        ctx.beginPath();
                        ctx.moveTo(meioX, CY);
                        ctx.lineTo(meioX, CY + 6);
                        ctx.stroke();
                    }
                }
            }

            // --- 4. TAMBOR MÓVEL (THIMBLE) ---
            const thimbleLeft = zeroSleeveX + (value * scalePX);
            const bevelW = 15;
            const thimbleW = 130;
            const thimbleH = 56;
            const thimbleY = CY - 28;

            // Desenha o Chanfro Cônico do Tambor
            ctx.fillStyle = '#cbd5e1';
            ctx.beginPath();
            ctx.moveTo(thimbleLeft, CY - 22);
            ctx.lineTo(thimbleLeft + bevelW, thimbleY);
            ctx.lineTo(thimbleLeft + bevelW + thimbleW, thimbleY);
            ctx.lineTo(thimbleLeft + bevelW + thimbleW, CY + 28);
            ctx.lineTo(thimbleLeft + bevelW, CY + 28);
            ctx.lineTo(thimbleLeft, CY + 22);
            ctx.closePath();
            ctx.fill();

            // Bordas e Contorno Metálico do Tambor
            ctx.strokeStyle = '#000000';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(thimbleLeft, CY - 22);
            ctx.lineTo(thimbleLeft + bevelW, thimbleY);
            ctx.lineTo(thimbleLeft + bevelW + thimbleW, thimbleY);
            ctx.lineTo(thimbleLeft + bevelW + thimbleW, CY + 28);
            ctx.lineTo(thimbleLeft + bevelW, CY + 28);
            ctx.lineTo(thimbleLeft, CY + 22);
            ctx.closePath();
            ctx.stroke();

            // Linha divisória do chanfro
            ctx.beginPath();
            ctx.moveTo(thimbleLeft + bevelW, thimbleY);
            ctx.lineTo(thimbleLeft + bevelW, CY + 28);
            ctx.stroke();

            // Recartilhado
            ctx.fillStyle = '#475569';
            ctx.fillRect(thimbleLeft + bevelW + thimbleW - 25, thimbleY + 1, 24, thimbleH - 2);

            // Catraca / Fricção Traseira
            ctx.fillStyle = '#94a3b8';
            ctx.fillRect(thimbleLeft + bevelW + thimbleW, CY - 18, 40, 36);
            ctx.strokeStyle = '#000000';
            ctx.strokeRect(thimbleLeft + bevelW + thimbleW, CY - 18, 40, 36);

            // --- 5. DIVISÃO CENTESIMAL DO TAMBOR (0 A 50) ---
            ctx.textAlign = 'right';
            ctx.font = 'bold 9px Arial';

            const thimbleVal = value % 0.5;
            const rotation = (thimbleVal / 0.5) * 50;

            for (let t = -10; t <= 10; t++) {
                let targetDivision = Math.round(rotation) - t;
                let actualDivision = (targetDivision + 50) % 50;

                let deltaDiv = t + (rotation % 1);
                let angle = (deltaDiv / 10) * (Math.PI / 3.2);

                if (Math.abs(angle) < Math.PI / 2) {
                    let posY = CY - 28 * Math.sin(angle);

                    ctx.strokeStyle = '#000000';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.moveTo(thimbleLeft, posY);
                    ctx.lineTo(thimbleLeft + 8, posY);
                    ctx.stroke();

                    if (actualDivision % 5 === 0) {
                        ctx.fillStyle = (actualDivision === 0) ? '#dc2626' : '#000000';
                        ctx.fillText(actualDivision.toString(), thimbleLeft - 3, posY + 3);
                    }
                }
            }
        }

        // Inicializa o tamanho e UI
        resizeCanvas();
        updateUI();
    </script>
</body>
</html>
