<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Paquímetro Digital</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
        }

        h2 { color: #333; }

        .canvas-container {
            position: relative;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            user-select: none;
            touch-action: none; /* Impede scroll no mobile ao arrastar */
        }

        svg {
            border: 1px solid #e0e0e0;
            background: #fafafa;
            cursor: grab;
        }

        svg:active { cursor: grabbing; }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 15px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 5px;
            background-color: #007bff;
            color: white;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <h2>Protótipo: Paquímetro Digital Interativo</h2>
    
    <div class="canvas-container">
        <svg id="paquimetro" width="700" height="250" viewBox="0 0 700 250">
            <g id="corpo-fixo">
                <rect x="50" y="90" width="600" height="50" fill="#cccccc" stroke="#999" stroke-width="2"/>
                <path d="M 50 90 L 50 220 L 80 220 L 100 140 L 100 90 Z" fill="#cccccc" stroke="#999" stroke-width="2"/>
                <path d="M 50 90 L 50 20 L 70 20 L 85 90 Z" fill="#cccccc" stroke="#999" stroke-width="2"/>
                
                <path d="M 100 140 L 100 130 M 105 140 L 105 135 M 110 140 L 110 135 M 115 140 L 115 135 M 120 140 L 120 135 M 125 140 L 125 125" stroke="#333" stroke-width="1.5" />
                </g>

            <g id="cursor-movel" transform="translate(0, 0)">
                <path d="M 100 90 L 100 220 L 120 220 L 140 140 L 220 140 L 220 90 Z" fill="#dddddd" stroke="#888" stroke-width="2"/>
                <path d="M 100 90 L 100 20 L 115 20 L 130 90 Z" fill="#dddddd" stroke="#888" stroke-width="2"/>
                
                <rect x="130" y="65" width="80" height="50" rx="5" fill="#333" stroke="#555"/>
                <rect x="135" y="70" width="70" height="40" rx="3" fill="#e1edd8" />
                
                <text id="visor-texto" x="170" y="98" font-family="monospace" font-size="20" font-weight="bold" fill="#222" text-anchor="middle">0.00</text>
                <text x="198" y="105" font-family="sans-serif" font-size="10" fill="#222">mm</text>
            </g>
        </svg>
    </div>

    <div class="controls">
        <button onclick="reiniciar()">Zerar/Resetar</button>
    </div>

    <script>
        const svg = document.getElementById('paquimetro');
        const cursorMovel = document.getElementById('cursor-movel');
        const visorTexto = document.getElementById('visor-texto');

        // Configurações da lógica matemática
        const PIXELS_POR_MM = 4; // 4 pixels na tela equivalem a 1mm real
        const MEDIDA_MAX_MM = 110; // Limite máximo de abertura
        const LIMITE_MAX_PX = MEDIDA_MAX_MM * PIXELS_POR_MM; 

        let arrastando = false;
        let xInicialMouse = 0;
        let xInicialCursor = 0;
        let posicaoAtualPx = 0;

        // Eventos para Desktop (Mouse) e Mobile (Touch)
        svg.addEventListener('mousedown', iniciarArrasto);
        window.addEventListener('mousemove', arrastar);
        window.addEventListener('mouseup', pararArrasto);

        svg.addEventListener('touchstart', iniciarArrasto, { passive: true });
        window.addEventListener('touchmove', arrastar, { passive: false });
        window.addEventListener('touchend', pararArrasto);

        function iniciarArrasto(e) {
            arrastando = true;
            // Trata mouse ou touch
            const clienteX = e.touches ? e.touches[0].clientX : e.clientX;
            xInicialMouse = clienteX;
            xInicialCursor = posicaoAtualPx;
        }

        function arrastar(e) {
            if (!arrastando) return;
            
            // Impede o scroll da página no mobile enquanto arrasta o paquímetro
            if(e.cancelable) e.preventDefault(); 

            const clienteX = e.touches ? e.touches[0].clientX : e.clientX;
            const deltaX = clienteX - xInicialMouse;
            
            // Calcula a nova posição limitando entre 0 e o máximo permitido
            let novaPosicaoPx = xInicialCursor + deltaX;
            if (novaPosicaoPx < 0) novaPosicaoPx = 0;
            if (novaPosicaoPx > LIMITE_MAX_PX) novaPosicaoPx = LIMITE_MAX_PX;

            posicaoAtualPx = novaPosicaoPx;

            // 1. Atualiza o Visual (Move o grupo SVG do cursor no eixo X)
            cursorMovel.setAttribute('transform', `translate(${posicaoAtualPx}, 0)`);

            // 2. Atualiza o Modelo Matemático (Calcula os mm reais)
            const medidaMm = posicaoAtualPx / PIXELS_POR_MM;
            
            // 3. Atualiza o Visor Digital (Exibe com duas casas decimais)
            visorTexto.textContent = medidaMm.toFixed(2);
        }

        function pararArrasto() {
            arrastando = false;
        }

        function reiniciar() {
            posicaoAtualPx = 0;
            cursorMovel.setAttribute('transform', 'translate(0, 0)');
            visorTexto.textContent = '0.00';
        }
    </script>
</body>
</html>
