<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Nova entrada de ciclo - Bateria nova</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root { color-scheme: dark; }
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 20px;
      background: #020617;
      color: #e5e7eb;
    }
    .container { max-width: 900px; margin: 0 auto; }
    .card {
      background: #020617;
      border-radius: 10px;
      padding: 16px 20px;
      margin-bottom: 20px;
      border: 1px solid #1e293b;
    }
    label { display: block; margin-bottom: 4px; color: #9ca3af; }
    input, button {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
      border-radius: 6px;
      border: 1px solid #1f2937;
      background: #0f172a;
      color: #e5e7eb;
    }
    button.primary { background: #22c55e; color: #020617; }
    button.danger { background: #b91c1c; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { padding: 6px; border-bottom: 1px solid #1f2937; }
    th { color: #9ca3af; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Nova entrada de ciclo – Bateria nova</h1>

    <div class="card">
      <button id="btnOpen" class="primary">Abrir / criar arquivo bateria_nova.json</button>
      <span id="fileStatus">Nenhum arquivo aberto</span>
    </div>

    <div class="card" id="formCard" style="display:none;">
      <h2>Novo ciclo</h2>

      <label>Rótulo</label>
      <input id="label" placeholder="Ex: Ciclo 100→72" />

      <label>SOC inicial (%)</label>
      <input id="socStart" type="number" />

      <label>SOC final (%)</label>
      <input id="socEnd" type="number" />

      <label>Tempo (horas decimais)</label>
      <input id="timeH" type="number" step="0.0001" />

      <label>mAh drenados</label>
      <input id="mAh" type="number" />

      <label>Observação</label>
      <input id="note" />

      <button id="btnAdd" class="primary">Adicionar ciclo</button>
    </div>

    <div class="card" id="listCard" style="display:none;">
      <h2>Ciclos existentes</h2>
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Rótulo</th>
            <th>SOC</th>
            <th>Δ</th>
            <th>Tempo</th>
            <th>mAh</th>
            <th>Capacidade</th>
            <th>SoH</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="cyclesBody"></tbody>
      </table>
    </div>
  </div>

  <script type="module">
    import {
      openFilePicker,
      createNewFile,
      getData,
      addCycle,
      removeCycle,
      uuid,
      NOMINAL
    } from "./api.js";

    let fileLoaded = false;

    document.getElementById("btnOpen").onclick = async () => {
      try {
        await openFilePicker();
      } catch {
        await createNewFile();
      }
      fileLoaded = true;
      document.getElementById("fileStatus").textContent = "Arquivo carregado";
      document.getElementById("formCard").style.display = "";
      document.getElementById("listCard").style.display = "";
      renderCycles();
    };

    function computeCycle() {
      const socStart = Number(socStartEl.value);
      const socEnd = Number(socEndEl.value);
      const timeH = Number(timeHEl.value);
      const mAh = Number(mAhEl.value);

      const delta = socStart - socEnd;
      const capacity = mAh / (delta / 100);
      const soh = (capacity / NOMINAL) * 100;

      return {
        delta,
        capacity,
        soh,
        drain: timeH ? delta / timeH : null,
        autonomy: timeH ? socEnd / (delta / timeH) : null
      };
    }

    const socStartEl = document.getElementById("socStart");
    const socEndEl = document.getElementById("socEnd");
    const timeHEl = document.getElementById("timeH");
    const mAhEl = document.getElementById("mAh");

    document.getElementById("btnAdd").onclick = async () => {
      if (!fileLoaded) return alert("Abra o arquivo primeiro.");

      const calc = computeCycle();

      const cycle = {
        id: uuid(),
        label: document.getElementById("label").value,
        soc_start: Number(socStartEl.value),
        soc_end: Number(socEndEl.value),
        delta_soc_percent: calc.delta,
        time_hours: Number(timeHEl.value),
        mAh: Number(mAhEl.value),
        capacity_estimated: calc.capacity,
        soh_percent: calc.soh,
        drain_percent_per_hour: calc.drain,
        autonomy_hours: calc.autonomy,
        note: document.getElementById("note").value
      };

      await addCycle(cycle);
      renderCycles();
    };

    async function renderCycles() {
      const data = getData();
      const tbody = document.getElementById("cyclesBody");
      tbody.innerHTML = "";

      data.cycles.forEach((c, i) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${i + 1}</td>
          <td>${c.label}</td>
          <td>${c.soc_start}→${c.soc_end}</td>
          <td>${c.delta_soc_percent}</td>
          <td>${c.time_hours ?? "-"}</td>
          <td>${c.mAh}</td>
          <td>${c.capacity_estimated.toFixed(0)}</td>
          <td>${c.soh_percent.toFixed(1)}%</td>
          <td><button class="danger" onclick="remove('${c.id}')">X</button></td>
        `;
        tbody.appendChild(tr);
      });
    }

    window.remove = async (id) => {
      await removeCycle(id);
      renderCycles();
    };
  </script>
</body>
</html>
