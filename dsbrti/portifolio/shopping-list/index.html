<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Compras</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="brutal-border-left"></div>
  <div class="brutal-border-right"></div>

  <header>
    <div class="header-deco">
      <div class="deco-box dec-1"></div>
      <div class="deco-box dec-2"></div>
      <div class="deco-line dec-3"></div>
      <div class="deco-cross dec-4">+</div>
      <div class="deco-cross dec-5">+</div>
      <div class="deco-text dec-6">LISTA DE COMPRAS</div>
      <div class="deco-stripe dec-7"></div>
      <div class="deco-stripe dec-8"></div>
    </div>
    <div class="header-content">
      <h1>Lista de Compras</h1>
      <p class="subtitle">Controle seu orçamento de forma simples</p>
    </div>
  </header>

  <main class="container">
    <button class="btn" style="background: var(--purple); color: white; width: 100%; margin-top: 12px;" onclick="exportarLista()">que tal compartilhar?<br> clique aqui</button>

    <section class="card">
      <h2>Orçamento</h2>
      <div class="input-group">
        <label for="budget">Defina seu limite</label>
        <input type="number" id="budget" placeholder="Ex: 700" />
      </div>
      <div class="summary">
        <div class="summary-item">
          <span class="label">Total</span>
          <span class="value">R$ <span id="total">0.00</span></span>
        </div>
        <div class="summary-item">
          <span class="label">Disponível</span>
          <span class="value" id="remaining">R$ 0.00</span>
        </div>
      </div>
      <p id="alerta" class="alert"></p>
    </section>

    <section class="card">
      <h2>Adicionar Item</h2>
      <div class="form-row">
        <div class="input-group">
          <label for="name">Produto</label>
          <input type="text" id="name" placeholder="Nome do produto" />
        </div>
        <div class="input-group">
          <label for="price">Preço (R$)</label>
          <input type="number" id="price" placeholder="0.00" step="0.01" min="0" />
        </div>
        <div class="input-group">
          <label for="qty">Quantidade</label>
          <input type="number" id="qty" placeholder="1" step="1" min="1" />
        </div>
      </div>
      <button class="btn btn-primary" onclick="addItem()">Adicionar Item</button>
    </section>

    <section class="card">
      <h2>Lista de Itens</h2>
      <div id="list" class="item-list"></div>
    </section>
  </main>

  <div class="brutal-float-left">
    <div class="float-box fb-1"><span>ADD</span></div>
    <div class="float-box fb-2"><span>RUSSO</span></div>
    <div class="float-box fb-3"><span>MEAOWS</span></div>
    <div class="float-cross fc-1">X</div>
    <div class="float-line fl-1"></div>
  </div>

  <div class="brutal-float-right">
    <div class="float-box fb-4"><span>OK</span></div>
    <div class="float-box fb-5"><span>GO</span></div>
    <div class="float-box fb-6"><span>ROÇADEIRA</span></div>
    <div class="float-box fb-7"><span>CARECUDO</span></div>
    <div class="float-cross fc-2">+</div>
    <div class="float-line fl-2"></div>
  </div>

  <button class="btn-toup" id="btnToup" onclick="window.scrollTo({top:0,behavior:'smooth'})">TOPO</button>

  <script src="app.js"></script>
</body>
</html>
