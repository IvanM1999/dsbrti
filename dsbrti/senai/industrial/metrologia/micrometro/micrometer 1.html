<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Micrômetro Centesimal | DestinyServicesBR</title>
    <style>
        :root {
            --primary: #1e293b;
            --destiny-blue: #0f172a;
            --accent: #d97706;
            --bg: #f1f5f9;
            --text-main: #0f172a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 10px;
        }

        .app-card {
            width: 100%;
            max-width: 820px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
        }

        .app-header {
            background: var(--destiny-blue);
            color: #ffffff;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid var(--accent);
        }

        .app-header h1 {
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .app-header span {
            font-size: 0.8rem;
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 10px;
            border-radius: 20px;
            color: #cbd5e1;
        }

        .simulator-area {
            background: #f8fafc;
            padding: 20px 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid #e2e8f0;
        }

        canvas {
            background: #ffffff;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
            cursor: pointer;
        }

        .control-panel {
            background: #f8fafc;
            padding: 20px;
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 20px;
            align-items: center;
        }

        @media (max-width: 650px) {
            .control-panel {
                grid-template-columns: 1fr;
            }
        }

        .arrows-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .arrow-row {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 6px;
        }

        .btn-arrow {
            background: #ffffff;
            border: 1px solid #cbd5e1;
            color: var(--text-main);
            padding: 10px 4px;
            font-size: 0.85rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s;
            text-align: center;
        }

        .btn-arrow:hover {
            background: #f1f5f9;
            border-color: #94a3b8;
        }

        .btn-arrow:active {
            transform: scale(0.95);
        }

        .result-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 15px;
        }

        .display-medida {
            font-size: 2.2rem;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            color: #1e293b;
            min-height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .display-medida.oculto {
            color: #94a3b8;
            letter-spacing: 2px;
            font-size: 1.8rem;
        }

        .toggle-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .toggle-btn:hover {
            background: #b45309;
        }

        .app-footer {
            background: #f1f5f9;
            padding: 10px 20px;
            text-align: center;
            font-size: 0.75rem;
            color: #64748b;
            border-top: 1px solid #e2e8f0;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="app-card">
        <div class="app-header">
            <h1>DestinyServicesBR | Metrologia Virtual</h1>
            <span>Micrômetro Centesimal (0.01mm)</span>
        </div>

        <div class="simulator-area">
            <canvas id="stefanelliCanvas" width="760" height="230"></canvas>
        </div>

        <div class="control-panel">
            <div class="arrows-section">
                <div class="arrow-row">
                    <button class="btn-arrow" onclick="alterarMedida(-1.00)">-1.0</button>
                    <button class="btn-arrow" onclick="alterarMedida(-0.50)">-0.5</button>
                    <button class="btn-arrow" onclick="alterarMedida(-0.10)">-0.1</button>
                    <button class="btn-arrow" onclick="alterarMedida(-0.05)">-0.05</button>
                    <button class="btn-arrow" onclick="alterarMedida(-0.01)">-0.01</button>
                    <button class="btn-arrow" onclick="alterarMedida(-0.005)">-0.005</button>
                </div>
                <div class="arrow-row">
                    <button class="btn-arrow" onclick="alterarMedida(1.00)">+1.0</button>
                    <button class="btn-arrow" onclick="alterarMedida(0.50)">+0.5</button>
                    <button class="btn-arrow" onclick="alterarMedida(0.10)">+0.1</button>
                    <button class="btn-arrow" onclick="alterarMedida(0.05)">+0.05</button>
                    <button class="btn-arrow" onclick="alterarMedida(0.01)">+0.01</button>
                    <button class="btn-arrow" onclick="alterarMedida(0.005)">+0.005</button>
                </div>
            </div>

            <div class="result-section">
                <div id="valorDisplay" class="display-medida">0.00 mm</div>
                <button id="btnVer" class="toggle-btn" onclick="toggleOcultar()">Ocultar Resposta</button>
            </div>
        </div>

        <div class="app-footer">
            &copy; 2026 DestinyServicesBR. Todos os direitos reservados.
        </div>
    </div>

    <script>
        const canvas = document.getElementById('stefanelliCanvas');
        const ctx = canvas.getContext('2d');
        const valorDisplay = document.getElementById('valorDisplay');
        const btnVer = document.getElementById('btnVer');

        let valorAtual = 0.00; // Começa rigorosamente zerado para verificar o alinhamento
        let ocultarValor = false;

        let isDragging = false;
        let lastX = 0;

        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            lastX = e.clientX;
        });

        window.addEventListener('mouseup', () => isDragging = false);

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const deltaX = e.clientX - lastX;
            lastX = e.clientX;
            let novoValor = valorAtual + (deltaX * 0.01);
            setMedida(novoValor);
        });

        canvas.addEventListener('touchstart', (e) => {
            isDragging = true;
            lastX = e.touches[0].clientX;
        });
        window.addEventListener('touchend', () => isDragging = false);
        window.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            const deltaX = e.touches[0].clientX - lastX;
            lastX = e.touches[0].clientX;
            let novoValor = valorAtual + (deltaX * 0.01);
            setMedida(novoValor);
        });

        function alterarMedida(val) {
            setMedida(valorAtual + val);
        }

        function toggleOcultar() {
            ocultarValor = !ocultarValor;
            if (ocultarValor) {
                valorDisplay.innerText = "??.?? mm";
                valorDisplay.classList.add('oculto');
                btnVer.innerText = "Mostrar Resposta";
            } else {
                valorDisplay.classList.remove('oculto');
                btnVer.innerText = "Ocultar Resposta";
                atualizarDisplayTexto();
            }
        }

        function setMedida(val) {
            valorAtual = Math.max(0, Math.min(25, val));
            atualizarDisplayTexto();
            desenhar();
        }

        function atualizarDisplayTexto() {
            if (!ocultarValor) {
                valorDisplay.innerText = valorAtual.toFixed(2) + " mm";
            }
        }

        function desenhar() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const CY = canvas.height / 2;
            const escalaMM = 12; // 1mm real = 12px

            // Configuração física da Origem
            // O zero real da bainha fica exatamente em x = 245
            const zeroBainhaX = 245;

            // --- 1. ARCO GEOMÉTRICO EM "C" REALISTA (MOLDE MITUTOYO) ---
            ctx.fillStyle = '#334155'; // Cinza Escuro Industrial
            ctx.strokeStyle = '#1e293b';
            ctx.lineWidth = 2;
            ctx.beginPath();
            
            // Corpo em C robusto usando curvas bezier para emular perfeitamente a fundição
            ctx.moveTo(110, CY - 20);
            ctx.lineTo(110, CY - 75);
            ctx.bezierCurveTo(30, CY - 75, 30, CY + 75, 110, CY + 75);
            ctx.lineTo(110, CY + 20);
            ctx.lineTo(190, CY + 20);
            ctx.bezierCurveTo(190, CY + 95, 10, CY + 95, 10, CY);
            ctx.bezierCurveTo(1, CY - 95, 190, CY - 95, 190, CY - 20);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // Batente Esquerdo (Anvil)
            ctx.fillStyle = '#94a3b8';
            ctx.fillRect(110, CY - 10, 15, 20);
            ctx.fillStyle = '#475569';
            ctx.fillRect(125, CY - 10, 3, 20); // Face de medição

            // --- 2. HASTE MÓVEL (SPINDLE) ---
            const deslocamentoHaste = valorAtual * escalaMM;
            ctx.fillStyle = '#cbd5e1';
            ctx.fillRect(128 + deslocamentoHaste, CY - 10, 117, 20);
            ctx.fillStyle = '#475569';
            ctx.fillRect(128 + deslocamentoHaste, CY - 10, 3, 20); // Face de contato móvel

            // --- 3. BAINHA FIXA (SLEEVE) ---
            const sleeveX = 230;
            const sleeveY = CY - 35;
            const sleeveW = 340;
            const sleeveH = 70;

            let gradSleeve = ctx.createLinearGradient(0, sleeveY, 0, sleeveY + sleeveH);
            gradSleeve.addColorStop(0, '#cbd5e1');
            gradSleeve.addColorStop(0.3, '#ffffff');
            gradSleeve.addColorStop(0.7, '#cbd5e1');
            gradSleeve.addColorStop(1, '#94a3b8');

            ctx.fillStyle = gradSleeve;
            ctx.fillRect(sleeveX, sleeveY, sleeveW, sleeveH);
            ctx.strokeStyle = '#334155';
            ctx.lineWidth = 1.5;
            ctx.strokeRect(sleeveX, sleeveY, sleeveW, sleeveH);

            // Linha de Fé (Horizontal central preta)
            ctx.strokeStyle = '#0f172a';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(sleeveX, CY);
            ctx.lineTo(sleeveX + sleeveW, CY);
            ctx.stroke();

            // --- 4. GRAVAÇÃO DAS ESCALAS DA BAINHA (ALINHAMENTO CALIBRADO) ---
            ctx.fillStyle = '#0f172a';
            ctx.font = 'bold 11px Arial';
            ctx.textAlign = 'center';
            ctx.lineWidth = 1;

            for (let i = 0; i <= 25; i++) {
                // posX parte exatamente do zeroBainhaX alinhado ao pixel
                let posX = zeroBainhaX + (i * escalaMM);

                // Traços Superiores (Milímetros Inteiros)
                ctx.beginPath();
                ctx.moveTo(posX, CY);
                ctx.lineTo(posX, CY - 12);
                ctx.stroke();

                if (i % 5 === 0) {
                    ctx.fillText(i, posX, CY - 17);
                }

                // Traços Inferiores (Meios milímetros)
                if (i < 25) {
                    let meioX = posX + (escalaMM / 2);
                    ctx.beginPath();
                    ctx.moveTo(meioX, CY);
                    ctx.lineTo(meioX, CY + 10);
                    ctx.stroke();
                }
            }

            // --- 5. TAMBOR MÓVEL (THIMBLE) ---
            // CORREÇÃO DE ALINHAMENTO: A extremidade final do chanfro (tamborX) 
            // no ponto 0.00mm deve parar EXATAMENTE sobre o zeroBainhaX.
            const tamborX = zeroBainhaX + (valorAtual * escalaMM);
            const tamborW = 180;
            const tamborH = 80;
            const tamborY = CY - tamborH / 2;
            const chanfroW = 15;

            // Corpo do Tambor
            let gradTambor = ctx.createLinearGradient(0, tamborY, 0, tamborY + tamborH);
            gradTambor.addColorStop(0, '#94a3b8');
            gradTambor.addColorStop(0.3, '#ffffff');
            gradTambor.addColorStop(0.7, '#cbd5e1');
            gradTambor.addColorStop(1, '#64748b');

            ctx.fillStyle = gradTambor;
            ctx.fillRect(tamborX, tamborY, tamborW, tamborH);

            // Borda Chanfrada Inclinada
            let gradChanfro = ctx.createLinearGradient(0, tamborY, 0, tamborY + tamborH);
            gradChanfro.addColorStop(0, '#94a3b8');
            gradChanfro.addColorStop(0.3, '#f1f5f9');
            gradChanfro.addColorStop(0.7, '#cbd5e1');
            gradChanfro.addColorStop(1, '#475569');

            ctx.fillStyle = gradChanfro;
            ctx.beginPath();
            // A ponta final do chanfro fica exatamente no tamborX
            ctx.moveTo(tamborX, tamborY);
            ctx.lineTo(tamborX - chanfroW, tamborY + 5);
            ctx.lineTo(tamborX - chanfroW, tamborY + tamborH - 5);
            ctx.lineTo(tamborX, tamborY + tamborH);
            ctx.closePath();
            ctx.fill();

            // Bordas e contorno do Tambor
            ctx.strokeStyle = '#334155';
            ctx.lineWidth = 1.5;
            ctx.strokeRect(tamborX, tamborY, tamborW, tamborH);
            ctx.beginPath();
            ctx.moveTo(tamborX - chanfroW, tamborY + 5);
            ctx.lineTo(tamborX - chanfroW, tamborY + tamborH - 5);
            ctx.stroke();

            // Textura Recartilhada Traseira
            ctx.fillStyle = '#334155';
            ctx.fillRect(tamborX + tamborW - 45, tamborY + 2, 43, tamborH - 4);

            // --- 6. GRADUAÇÕES DO TAMBOR (0 a 50) ---
            ctx.fillStyle = '#0f172a';
            ctx.strokeStyle = '#0f172a';
            ctx.font = 'bold 10px Arial';
            ctx.textAlign = 'right';
            ctx.lineWidth = 1;

            const espacamentoY = 3.2;
            const valorNoTambor = valorAtual % 0.5;
            // No zero real, a linha 0 deve bater perfeitamente no centro
            const rotacaotambor = (valorNoTambor / 0.01);

            for (let t = -12; t <= 12; t++) {
                let divisaoMirada = Math.round(rotacaotambor) - t;
                let divisaoReal = (divisaoMirada + 50) % 50;

                let deltaY = t * espacamentoY + ((rotacaotambor % 1) * espacamentoY);
                let angulo = (deltaY / (tamborH / 2)) * (Math.PI / 2);

                if (Math.abs(angulo) < 1.35) {
                    let posY = CY - (tamborH / 2) * Math.sin(angulo);

                    ctx.beginPath();
                    // O risco de graduação começa na ponta do chanfro (tamborX - chanfroW) até um recuo de 8px
                    ctx.moveTo(tamborX - chanfroW, posY);
                    ctx.lineTo(tamborX - chanfroW + 8, posY);
                    ctx.stroke();

                    if (divisaoReal % 5 === 0) {
                        // Linha zero em vermelho igual ao Stefanelli
                        ctx.fillStyle = (divisaoReal === 0) ? '#dc2626' : '#0f172a';
                        ctx.fillText(divisaoReal.toString(), tamborX - chanfroW - 4, posY + 3.5);
                        ctx.fillStyle = '#0f172a';
                    }
                }
            }
        }

        // Começar exatamente em zero para validar visualmente o alinhamento perfeito
        setMedida(0.00);
    </script>
</body>
</html>
